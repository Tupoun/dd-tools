<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení — DD Tools</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
    (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.className = saved || (prefersDark ? 'dark' : 'light');
    })();
    </script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>DD Tools</h1>
                <p>Přihlaste se pro pokračování</p>
            </div>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Uživatelské jméno</label>
                    <input type="text" name="username" class="form-control"
                           autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">Heslo</label>
                    <input type="password" name="password" class="form-control"
                           autocomplete="current-password">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" name="remember" value="1"
                           id="remember" checked style="width: auto;">
                    <label for="remember" style="margin: 0; font-weight: 400; cursor: pointer;">
                        Zapamatovat mě (30 dní)
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Přihlásit se
                </button>
            </form>
        </div>
    </div>
</body>
</html>
